name: ci

# This project is a west project in the com-junkawasaki/root superproject; its
# deps reference sibling repos via :local/root
# (../../com-junkawasaki/langgraph-clj, .../langchain-clj, and
# ../cloud-itonami-isic-8291 for the optional banking.corporate-intel
# cross-reference). All PUBLIC, so the test job reconstructs the workspace
# layout by checking them out into the expected relative paths -- no token
# needed. Same pattern as cloud-itonami-isic-6910 / cloud-itonami-isic-8291's
# ci.yml.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      # lay the west workspace out so ../../com-junkawasaki/* resolves
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-6419 }
      - uses: actions/checkout@v4
        with:
          repository: com-junkawasaki/langgraph-clj
          path: orgs/com-junkawasaki/langgraph-clj
      - uses: actions/checkout@v4
        with:
          repository: com-junkawasaki/langchain-clj
          path: orgs/com-junkawasaki/langchain-clj
      - uses: actions/checkout@v4
        with:
          repository: cloud-itonami/cloud-itonami-isic-8291
          path: orgs/cloud-itonami/cloud-itonami-isic-8291
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (governor contract · phase invariants · store parity · registry conformance · facts coverage · corporate-intelligence integration)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-6419
        run: clojure -M:dev:test
